<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoAttend | Student Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ancizar+Serif:ital,wght@0,300..900;1,300..900&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="navbar">
        <div class="navbar-inner">
            <div class="logo">
                <span class="logo-mark">G</span>
                GoAttend
            </div>
            <h3>Student Details Dashboard</h3>
            <button class="nav-cta" id="open-add-modal-nav">+ Add Student</button>
        </div>
    </header>
    <main class="page">
        <div class="page-inner">

            <p class="empty-state" id="empty-state">
                No students added yet. Click "+ Add Student" to add your first record.
            </p>

            <table class="student-table" id="student-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Programme</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="student-table-body">

                </tbody>
            </table>

        </div>
    </main>
    <dialog id="add-modal" class="modal">
        <form id="add-student-form" class="modal-form">
            <h3>Add Student</h3>

            <label for="input-name">Full Name</label>
            <input type="text" id="input-name" name="name" placeholder="e.g. Matthew P Eapen" required>

            <label for="input-email">Email</label>
            <input type="email" id="input-email" name="email" placeholder="e.g. matthew@email.com" required>

            <label for="input-phone">Phone Number</label>
            <input type="tel" id="input-phone" name="phone" placeholder="10 digit phone number" maxlength="10" required>

            <label for="input-dob">Date of Birth</label>
            <input type="date" id="input-dob" name="dob" required>

            <label for="input-department">Department</label>
            <select id="input-department" name="department" required>
                <option value="" disabled selected>Select a department</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Statistics">Statistics</option>
                <option value="Management">Management</option>
                <option value="Commerce">Commerce</option>
                <option value="Mathematics">Mathematics</option>
            </select>

            <label for="input-programme">Programme</label>
            <select id="input-programme" name="programme" required>
                <option value="" disabled selected>Select a programme</option>
                <option value="BCA">BCA</option>
                <option value="MCA">MCA</option>
                <option value="B.Sc">B.Sc</option>
                <option value="M.Sc">M.Sc</option>
                <option value="PhD">PhD</option>
            </select>

            <p class="form-error" id="add-form-error"></p>

            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="cancel-add-modal">Cancel</button>
                <button type="submit" class="btn-primary">Save Student</button>
            </div>
        </form>
    </dialog>
    <dialog id="view-modal" class="modal">
        <div class="modal-form">
            <h3>Student Details</h3>

            <p><strong>Name:</strong> <span id="view-name"></span></p>
            <p><strong>Email:</strong> <span id="view-email"></span></p>
            <p><strong>Phone Number:</strong> <span id="view-phone"></span></p>
            <p><strong>Date of Birth:</strong> <span id="view-dob"></span></p>
            <p><strong>Department:</strong> <span id="view-department"></span></p>
            <p><strong>Programme:</strong> <span id="view-programme"></span></p>

            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="close-view-modal">Close</button>
                <button type="button" class="btn-primary" id="open-edit-modal">Update</button>
            </div>
        </div>
    </dialog>
    <dialog id="edit-modal" class="modal">
        <form id="edit-student-form" class="modal-form">
            <h3>Update Student</h3>

            <input type="hidden" id="edit-id">

            <label for="edit-name">Full Name</label>
            <input type="text" id="edit-name" name="name" required>

            <label for="edit-email">Email</label>
            <input type="email" id="edit-email" name="email" required>

            <label for="edit-phone">Phone Number</label>
            <input type="tel" id="edit-phone" name="phone" pattern="[0-9]{10}" maxlength="10" required>

            <label for="edit-dob">Date of Birth</label>
            <input type="date" id="edit-dob" name="dob" required>

            <label for="edit-department">Department</label>
            <select id="edit-department" name="department" required>
                <option value="Computer Science">Computer Science</option>
                <option value="Statistics">Statistics</option>
                <option value="Management">Management</option>
                <option value="Commerce">Commerce</option>
                <option value="Mathematics">Mathematics</option>
            </select>

            <label for="edit-programme">Programme</label>
            <select id="edit-programme" name="programme" required>
                <option value="BCA">BCA</option>
                <option value="MCA">MCA</option>
                <option value="B.Sc">B.Sc</option>
                <option value="M.Sc">M.Sc</option>
                <option value="PhD">PhD</option>
            </select>

            <p class="form-error" id="edit-form-error"></p>

            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="cancel-edit-modal">Cancel</button>
                <button type="submit" class="btn-primary">Save Changes</button>
            </div>
        </form>
    </dialog>

    <script src="crud.js"></script>
</body>

</html>
